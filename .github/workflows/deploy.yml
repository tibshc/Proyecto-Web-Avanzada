name: CI/CD Pipeline

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  lint_and_test:
    name: Lint & Verify
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      # En un escenario real, aquí se ejecutaría `npm run lint` y `npm test` en cada servicio.
      # Por simplicidad, simularemos un check de sintaxis o instalación de dependencias.
      - name: Install dependencies (API Gateway)
        working-directory: ./api-gateway
        run: npm install

      - name: Install dependencies (Auth Service)
        working-directory: ./auth-service
        run: npm install

      - name: Install dependencies (Inventory Service)
        working-directory: ./inventory-service
        run: npm install

      - name: Install dependencies (Chat Service)
        working-directory: ./chat-service
        run: npm install

      - name: Install dependencies (Frontend)
        working-directory: ./client
        run: npm install

  build_docker:
    name: Build Docker Images
    runs-on: ubuntu-latest
    needs: lint_and_test
    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Build API Gateway Image
        uses: docker/build-push-action@v4
        with:
          context: ./api-gateway
          push: false
          tags: apigateway:latest

      - name: Build Auth Service Image
        uses: docker/build-push-action@v4
        with:
          context: ./auth-service
          push: false
          tags: authservice:latest

      - name: Build Inventory Service Image
        uses: docker/build-push-action@v4
        with:
          context: ./inventory-service
          push: false
          tags: inventoryservice:latest

      - name: Build Chat Service Image
        uses: docker/build-push-action@v4
        with:
          context: ./chat-service
          push: false
          tags: chatservice:latest

      - name: Build Frontend Image
        uses: docker/build-push-action@v4
        with:
          context: ./client
          push: false
          tags: frontend:latest

      - name: Validate with Docker Compose
        run: docker-compose config
